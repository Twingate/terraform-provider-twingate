twingate:
  network: {{ .TwingateNetwork }}
  host: {{ .TwingateHost }}

port: {{ .Port }}
metricsPort: {{ .MetricsPort }}

tls:
  certificateFile: {{ .TLS.CertificateFile }}
  privateKeyFile: {{ .TLS.PrivateKeyFile }}

{{- if .KubernetesResources }}

kubernetes:
  upstreams:
  {{- range .KubernetesResources }}
  - name: {{ .Name }}
    address: {{ .Address }}
    inCluster: {{ .InCluster }}
  {{- end }}
{{- end }}

{{- if .SSHResources }}

ssh:
  gateway:
    username: {{ .SshGateway.Username }}
    key:
      type: {{ .SshGateway.KeyType }}
    hostCertificate:
      ttl: {{ .SshGateway.HostCertTTL }}
    userCertificate:
      ttl: {{ .SshGateway.UserCertTTL }}

  ca:
    {{- if .SshCA.VaultAddr }}
    vault:
      address: {{ .SshCA.VaultAddr }}
      caBundleFile: {{ .SshCA.VaultCABundleFile }}
      mount: {{ .SshCA.VaultMount }}
      role: {{ .SshCA.VaultRole }}
    {{- else if .SshCA.PrivateKeyFile }}
    manual:
      privateKeyFile: {{ .SshCA.PrivateKeyFile }}
    {{- end }}

  upstreams:
  {{- range .SSHResources }}
  - name: {{ .Name }}
    address: {{ .Address }}
    {{- if .Username }}
    user: {{ .Username }}
    {{- end }}
  {{- end }}
{{- end }}